<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CARIBE VIVO by Gourmet Fusion</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main>
            <section id="multimedia">
                <div class="multimedia-header reveal">
                <p class="section-label">food gallery</p>
                <h2 class="display-heading">Festival Dishes</h2>
        
                </div>

                <div class="gallery-grid">
                <div class="gallery-item gi-1 reveal">
                    <img src="./assets/video pic/celele-cartagena-colombia.jpg" alt="1" />
                    <div class="g-overlay"><span>2025 Edition</span></div>
                </div>
                <div class="gallery-item gi-2 video-thumb reveal reveal-delay-1">
                    <img src="./assets/video pic/caption (2).jpg" alt="2" />
                    <div class="g-overlay"><span>Recipes</span></div>
                </div>
                <div class="gallery-item gi-3 reveal reveal-delay-2">
                    <img src="./assets/video pic/caption (3).jpg" alt="3" />
                    <div class="g-overlay"><span>Fresh products</span></div>
                </div>
                <div class="gallery-item gi-4 reveal reveal-delay-1">
                    <img src="./assets/video pic/caption (4).jpg" alt="4" />
                    <div class="g-overlay"><span>Innovative products</span></div>
                </div>
                <div class="gallery-item gi-5 video-thumb reveal reveal-delay-2">
                    <img src="./assets/video pic/caption (6).jpg" alt="5" />
                    <div class="g-overlay"><span>Chef's Dinners</span></div>
                </div>
                <div class="gallery-item gi-6 reveal reveal-delay-3">
                    <img src="./assets/video pic/caption (8).jpg" alt="6" />
                    <div class="g-overlay"><span>Native Ingredients</span></div>
                </div>
                </div>
            </section>
        </main> 
    </body>
        
</html>
