<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Portfolio</title>    
     <link rel="stylesheet" href="styles.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap');
        </style>
    </head>
    <body class="el-body">
          <main class="contact_container">
        <div class="contact_info">
            <h1>Let's talk 👋</h1>
            <p>Have a project in mind or just want to say hi? Fill out the form and I'll get back to you as soon as possible.</p>

            <div class="contact_details">
                <div class="contact_item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#c2185b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 6l-10 7L2 6" stroke="#c2185b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>yezz@hotmail.com</span>
                </div>
                <div class="contact_item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" stroke="#c2185b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <a href="https://github.com/YesRv" target="_blank">github.com/YesRv</a>
                </div>
            </div>
        </div>

        <form class="contact_form">
            <div class="form_row">
                <div class="form_group">
                    <label for="fname">Name</label>
                    <input type="text" id="fname" name="fname" placeholder="Your Name" required>
                </div>
                <div class="form_group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" placeholder="Last Name" required>
                </div>
            </div>

            <div class="form_group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email addres" required>
            </div>

            <div class="form_group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="How can I help you?">
            </div>

            <div class="form_group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
            </div>

            <button type="submit" class="btn_submit">Send Message</button>
        </form>
    </main>
     

        <footer> © 2026 Mi Portfolio. Todos los derechos reservados.</footer>
    </body>
</html>
